<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Presidio to production layers</title>
  <desc id="desc">A construction-style illustration showing Presidio as a foundation and production gateway capabilities built above it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111e"/>
      <stop offset=".58" stop-color="#111827"/>
      <stop offset="1" stop-color="#24160a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif">
    <text x="74" y="88" fill="#f97316" font-size="18" font-weight="700" letter-spacing="3">FROM LIBRARY TO PRODUCT</text>
    <text x="74" y="134" fill="#f8fafc" font-size="38" font-weight="800">Detection is a foundation, not the whole building.</text>
  </g>
