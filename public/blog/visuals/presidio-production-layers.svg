<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Presidio to production layers</title>
  <desc id="desc">A diagram showing Presidio as a detection foundation with production gateway layers above it.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="42" y="42" width="1116" height="546" rx="36" fill="#0b1526" stroke="#24415f"/>
  <text x="84" y="98" fill="#22d3ee" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">FROM LIBRARY TO PRODUCTION</text>
  <text x="84" y="144" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="800">Detection is the foundation. Governance is the product.</text>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="800">
    <rect x="220" y="446" width="760" height="72" rx="20" fill="#062b3a" stroke="#22d3ee"/>
    <text x="268" y="491" fill="#a7f3d0">Presidio detection and anonymization foundation</text>
    <rect x="220" y="352" width="760" height="72" rx="20" fill="#111c2f" stroke="#334155"/>
    <text x="268" y="397" fill="#f8fafc">Token vault and reversible restore controls</text>
    <rect x="220" y="258" width="760" height="72" rx="20" fill="#111c2f" stroke="#334155"/>
    <text x="268" y="303" fill="#f8fafc">Tenant policy, model routing, and fail-closed behavior</text>
    <rect x="220" y="164" width="760" height="72" rx="20" fill="#2a1d12" stroke="#f97316"/>
    <text x="268" y="209" fill="#fed7aa">Audit evidence, admin UX, deployment operations</text>
  </g>
</svg>
