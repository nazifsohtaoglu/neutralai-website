<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Financial services AI control point</title>
  <desc id="desc">A financial services AI workflow showing prompt traffic routed through masking, policy, and audit evidence before model delivery.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="42" y="42" width="1116" height="546" rx="36" fill="#0b1526" stroke="#1f3b57"/>
  <text x="84" y="96" fill="#22d3ee" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">UK FINANCIAL SERVICES AI FLOW</text>
  <text x="84" y="142" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="800">Useful AI, with customer data controlled before egress.</text>
  <g font-family="Arial, sans-serif">
    <rect x="84" y="230" width="210" height="118" rx="24" fill="#111c2f" stroke="#334155"/>
    <text x="116" y="276" fill="#f8fafc" font-size="24" font-weight="800">Prompt</text>
    <text x="116" y="314" fill="#cbd5e1" font-size="18">claim notes</text>
    <text x="116" y="340" fill="#cbd5e1" font-size="18">IBAN / phone</text>
    <path d="M310 289H424" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <path d="M410 270L432 289L410 308" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="452" y="204" width="296" height="170" rx="28" fill="#062b3a" stroke="#22d3ee"/>
    <text x="496" y="252" fill="#f8fafc" font-size="26" font-weight="800">NeutralAI</text>
    <text x="496" y="292" fill="#a7f3d0" font-size="19">mask sensitive values</text>
    <text x="496" y="322" fill="#a7f3d0" font-size="19">apply policy</text>
    <text x="496" y="352" fill="#a7f3d0" font-size="19">record evidence</text>
    <path d="M772 289H886" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <path d="M872 270L894 289L872 308" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="914" y="230" width="210" height="118" rx="24" fill="#111c2f" stroke="#334155"/>
    <text x="946" y="276" fill="#f8fafc" font-size="24" font-weight="800">AI provider</text>
    <text x="946" y="314" fill="#cbd5e1" font-size="18">sanitized</text>
    <text x="946" y="340" fill="#cbd5e1" font-size="18">request only</text>
    <rect x="238" y="430" width="724" height="74" rx="22" fill="#1f2937" stroke="#f97316" stroke-opacity=".8"/>
    <text x="280" y="476" fill="#fed7aa" font-size="22" font-weight="700">Governance output: who used AI, what control ran, what evidence exists.</text>
  </g>
</svg>
