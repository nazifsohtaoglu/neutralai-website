    <text x="78" y="134" fill="#f8fafc" font-size="38" font-weight="800">Customer notes enter AI through a control desk.</text>
    <text x="78" y="170" fill="#b6c2d4" font-size="20">Mask first, route second, keep audit evidence.</text>
  </g>
