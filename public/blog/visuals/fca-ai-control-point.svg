<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Financial services AI control point</title>
  <desc id="desc">An editorial illustration of a bank operations desk routing customer notes through a controlled AI gateway with audit evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset=".58" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#163016"/>
    </linearGradient>
    <linearGradient id="screen" x1="426" y1="170" x2="760" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d3a4b"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
