<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vendor benchmark evidence map</title>
  <desc id="desc">A comparison diagram showing public claims, metric mismatch, and buyer questions before trusting PII benchmark numbers.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="32" y="32" width="1136" height="566" rx="34" fill="#0b1526" stroke="#24415f"/>
  <text x="74" y="88" fill="#22d3ee" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">BENCHMARK EVIDENCE MAP</text>
  <text x="74" y="132" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="800">Do not compare vendor numbers without the test context.</text>
  <g transform="translate(74 186)">
    <rect width="300" height="240" rx="24" fill="#101c30" stroke="#22d3ee" stroke-opacity=".45"/>
    <text x="28" y="48" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="800">NeutralAI</text>
    <text x="28" y="88" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Public F1 benchmark</text>
    <text x="28" y="128" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Methodology matters</text>
    <text x="28" y="160" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Presidio baseline</text>
    <text x="28" y="192" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Product benchmark</text>
  </g>
  <g transform="translate(450 186)">
    <rect width="300" height="240" rx="24" fill="#101c30" stroke="#f97316" stroke-opacity=".45"/>
    <text x="28" y="48" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="800">Private AI</text>
    <text x="28" y="88" fill="#fed7aa" font-family="Arial, sans-serif" font-size="20" font-weight="700">Vendor-published study</text>
    <text x="28" y="128" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Dataset differs</text>
    <text x="28" y="160" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Metric definitions differ</text>
    <text x="28" y="192" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Not direct parity</text>
  </g>
  <g transform="translate(826 186)">
    <rect width="300" height="240" rx="24" fill="#101c30" stroke="#60a5fa" stroke-opacity=".45"/>
    <text x="28" y="48" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="800">Nightfall</text>
    <text x="28" y="88" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="20" font-weight="700">Detector claims</text>
    <text x="28" y="128" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Precision != F1</text>
    <text x="28" y="160" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Detection scope differs</text>
    <text x="28" y="192" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Ask for test data</text>
  </g>
  <rect x="150" y="480" width="900" height="70" rx="22" fill="#062b3a" stroke="#22d3ee" stroke-opacity=".55"/>
  <text x="190" y="525" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="700">Buyer rule: compare dataset + scorer + entity scope + metric, not headlines.</text>
</svg>
