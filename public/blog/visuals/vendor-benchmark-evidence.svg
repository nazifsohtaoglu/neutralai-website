<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vendor benchmark evidence map</title>
  <desc id="desc">An editorial evidence board comparing benchmark claims with sticky notes, a magnifier, and buyer questions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset=".55" stop-color="#102033"/>
      <stop offset="1" stop-color="#20131b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif">
    <text x="72" y="88" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">BENCHMARK BUYER GUIDE</text>
    <text x="72" y="134" fill="#f8fafc" font-size="38" font-weight="800">Read the evidence, not the headline number.</text>
  </g>
  <rect x="92" y="172" width="746" height="366" rx="34" fill="#0f1b2c" stroke="#2d4561" filter="url(#shadow)"/>
  <path d="M138 242H790M138 326H790M138 410H790" stroke="#21344d" stroke-width="2"/>
  <path d="M302 196V514M522 196V514" stroke="#21344d" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-weight="800">
    <text x="138" y="224" fill="#f8fafc" font-size="22">Claim</text>
    <text x="340" y="224" fill="#f8fafc" font-size="22">Dataset</text>
    <text x="560" y="224" fill="#f8fafc" font-size="22">Metric</text>
  </g>
  <g>
    <rect x="128" y="262" width="138" height="44" rx="14" fill="#123544" stroke="#22d3ee"/>
    <rect x="336" y="262" width="124" height="44" rx="14" fill="#172238" stroke="#64748b"/>
    <rect x="560" y="262" width="176" height="44" rx="14" fill="#172238" stroke="#64748b"/>
    <rect x="128" y="348" width="138" height="44" rx="14" fill="#2c1d13" stroke="#f97316"/>
    <rect x="336" y="348" width="124" height="44" rx="14" fill="#172238" stroke="#64748b"/>
    <rect x="560" y="348" width="176" height="44" rx="14" fill="#172238" stroke="#64748b"/>
    <rect x="128" y="434" width="138" height="44" rx="14" fill="#13251f" stroke="#34d399"/>
    <rect x="336" y="434" width="124" height="44" rx="14" fill="#172238" stroke="#64748b"/>
    <rect x="560" y="434" width="176" height="44" rx="14" fill="#172238" stroke="#64748b"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="700">
    <text x="152" y="291" fill="#a5f3fc">F1 score</text>
    <text x="362" y="291" fill="#cbd5e1">public?</text>
    <text x="586" y="291" fill="#cbd5e1">entity scope</text>
    <text x="152" y="377" fill="#fed7aa">accuracy</text>
    <text x="362" y="377" fill="#cbd5e1">sample?</text>
    <text x="586" y="377" fill="#cbd5e1">precision?</text>
    <text x="152" y="463" fill="#bbf7d0">coverage</text>
    <text x="362" y="463" fill="#cbd5e1">domain?</text>
    <text x="586" y="463" fill="#cbd5e1">recall?</text>
  </g>
  <g transform="translate(835 210)" filter="url(#shadow)">
    <circle cx="112" cy="112" r="92" fill="#091525" stroke="#22d3ee" stroke-width="10"/>
    <circle cx="112" cy="112" r="56" fill="#0f2534" stroke="#5eead4" stroke-opacity=".6"/>
    <path d="M178 178L276 276" stroke="#22d3ee" stroke-width="22" stroke-linecap="round"/>
    <rect x="34" y="286" width="250" height="72" rx="22" fill="#211827" stroke="#f97316"/>
    <text x="62" y="331" fill="#fed7aa" font-family="Arial, sans-serif" font-size="22" font-weight="800">Ask for context</text>
  </g>
</svg>
