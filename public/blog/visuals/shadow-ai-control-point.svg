<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shadow AI control point</title>
  <desc id="desc">A split scene showing unmanaged AI copy-paste risk turning into an approved, masked AI workflow through a visible control point.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120b18"/>
      <stop offset=".48" stop-color="#07111f"/>
      <stop offset="1" stop-color="#061f22"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(304 246) rotate(78) scale(230 170)">
      <stop stop-color="#fb7185" stop-opacity=".34"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="approved" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 250) rotate(90) scale(260 210)">
      <stop stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="600" height="630" fill="url(#lamp)"/>
  <rect x="600" width="600" height="630" fill="url(#approved)"/>
  <g font-family="Arial, sans-serif">
    <text x="72" y="86" fill="#fb7185" font-size="18" font-weight="700" letter-spacing="3">SHADOW AI</text>
    <text x="72" y="132" fill="#f8fafc" font-size="36" font-weight="800">Risk hides in copy and paste.</text>
    <text x="738" y="86" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">CONTROLLED AI</text>
    <text x="738" y="132" fill="#f8fafc" font-size="36" font-weight="800">Approvals need a path.</text>
  </g>
  <path d="M600 92V548" stroke="#2c3f58" stroke-width="2" stroke-dasharray="10 12"/>
  <g>
    <rect x="112" y="228" width="318" height="212" rx="30" fill="#150f1b" stroke="#7f1d1d"/>
    <circle cx="180" cy="300" r="34" fill="#fed7aa"/>
    <path d="M150 382C176 336 220 336 246 382" stroke="#fed7aa" stroke-width="18" stroke-linecap="round"/>
    <rect x="278" y="280" width="106" height="82" rx="15" fill="#0f172a" stroke="#fb7185"/>
    <path d="M302 314H360M302 340H346" stroke="#fb7185" stroke-width="9" stroke-linecap="round"/>
    <path d="M160 482H386" stroke="#fb7185" stroke-width="12" stroke-linecap="round" opacity=".6"/>
  </g>
  <g>
