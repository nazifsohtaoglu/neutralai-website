    <text x="716" y="86" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">CONTROLLED PATH</text>
    <text x="716" y="132" fill="#f8fafc" font-size="38" font-weight="800">Approved AI leaves evidence behind.</text>
