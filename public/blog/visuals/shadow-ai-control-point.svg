<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shadow AI control point</title>
  <desc id="desc">A dramatic split corridor where unmanaged prompt copying becomes a visible approved AI path through NeutralAI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#130b18"/>
      <stop offset=".48" stop-color="#07111f"/>
      <stop offset="1" stop-color="#062326"/>
    </linearGradient>
    <radialGradient id="red" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(258 292) scale(270 260)">
      <stop stop-color="#fb7185" stop-opacity=".32"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 292) scale(300 260)">
      <stop stop-color="#22d3ee" stop-opacity=".30"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity=".48"/>
    </filter>
  </defs>
