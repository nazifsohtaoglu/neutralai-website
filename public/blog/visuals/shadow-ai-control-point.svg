    <path d="M506 320H566" stroke="#fed7aa" stroke-width="8" stroke-linecap="round"/>
    <path d="M548 296L576 320L548 344" stroke="#fed7aa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="666" y="226" width="156" height="216" rx="30" fill="#062b3a" stroke="#22d3ee"/>
    <rect x="704" y="268" width="82" height="98" rx="20" fill="#0f172a" stroke="#5eead4"/>
    <path d="M728 318L744 334L770 296" stroke="#34d399" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M714 396H774" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="886" y="214" width="210" height="236" rx="28" fill="#0d1a2c" stroke="#2f4c68"/>
    <rect x="930" y="256" width="128" height="30" rx="15" fill="#22d3ee" opacity=".24"/>
    <rect x="926" y="316" width="132" height="22" rx="11" fill="#34d399" opacity=".75"/>
