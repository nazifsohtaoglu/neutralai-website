<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PII detection stack</title>
  <desc id="desc">A visual stack of detectors inspecting a prompt with lenses, labels, and policy routing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset=".6" stop-color="#0d1728"/>
      <stop offset="1" stop-color="#08251d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".38"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif">
    <text x="76" y="88" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">PII DETECTION</text>
    <text x="76" y="134" fill="#f8fafc" font-size="38" font-weight="800">One prompt, several kinds of evidence.</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="88" y="204" width="376" height="280" rx="32" fill="#101827" stroke="#334155"/>
    <rect x="136" y="256" width="270" height="24" rx="12" fill="#f8fafc" opacity=".74"/>
    <rect x="136" y="304" width="222" height="24" rx="12" fill="#fda4af"/>
    <rect x="136" y="352" width="286" height="24" rx="12" fill="#f8fafc" opacity=".44"/>
    <rect x="136" y="400" width="196" height="24" rx="12" fill="#fbbf24"/>
    <circle cx="398" cy="326" r="58" fill="#0b1526" stroke="#22d3ee" stroke-width="9"/>
    <path d="M438 366L496 424" stroke="#22d3ee" stroke-width="16" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="548" y="184" width="160" height="86" rx="24" fill="#13251f" stroke="#34d399"/>
    <rect x="548" y="300" width="160" height="86" rx="24" fill="#16233a" stroke="#60a5fa"/>
    <rect x="548" y="416" width="160" height="86" rx="24" fill="#2b1d13" stroke="#f97316"/>
    <text x="590" y="237" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="22" font-weight="800">Rules</text>
    <text x="604" y="353" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="22" font-weight="800">NER</text>
    <text x="582" y="469" fill="#fed7aa" font-family="Arial, sans-serif" font-size="22" font-weight="800">Context</text>
    <path d="M472 326C508 302 520 226 548 226M472 326H548M472 326C512 362 522 458 548 458" stroke="#3d5874" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="792" y="236" width="292" height="196" rx="34" fill="#062b3a" stroke="#22d3ee"/>
    <path d="M850 314H1018" stroke="#a7f3d0" stroke-width="14" stroke-linecap="round"/>
    <path d="M850 360H980" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" opacity=".44"/>
    <circle cx="850" cy="488" r="34" fill="#34d399"/>
    <path d="M834 488L846 502L870 468" stroke="#052e1a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="900" y="498" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="800">Mask or allow</text>
  </g>
</svg>
