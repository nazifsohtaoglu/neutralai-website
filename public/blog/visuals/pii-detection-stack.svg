<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PII detection stack diagram</title>
  <desc id="desc">A layered PII detection stack using regex, NER, semantic validation, policy, and masking.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="40" y="40" width="1120" height="550" rx="36" fill="#0b1526" stroke="#24415f"/>
  <text x="82" y="98" fill="#22d3ee" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">PII DETECTION STACK</text>
  <text x="82" y="144" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="800">Different detectors solve different parts of the prompt.</text>
  <g font-family="Arial, sans-serif">
    <rect x="150" y="214" width="900" height="68" rx="20" fill="#111c2f" stroke="#334155"/>
    <text x="190" y="257" fill="#f8fafc" font-size="24" font-weight="800">Prompt text</text>
    <rect x="150" y="306" width="260" height="92" rx="22" fill="#062b3a" stroke="#22d3ee"/>
    <text x="184" y="344" fill="#a7f3d0" font-size="24" font-weight="800">Regex + rules</text>
    <text x="184" y="374" fill="#cbd5e1" font-size="17">emails, IBANs, IDs</text>
    <rect x="470" y="306" width="260" height="92" rx="22" fill="#1d2438" stroke="#60a5fa"/>
    <text x="504" y="344" fill="#bfdbfe" font-size="24" font-weight="800">NER</text>
    <text x="504" y="374" fill="#cbd5e1" font-size="17">names, locations</text>
    <rect x="790" y="306" width="260" height="92" rx="22" fill="#2a1d12" stroke="#f97316"/>
    <text x="824" y="344" fill="#fed7aa" font-size="24" font-weight="800">Semantic check</text>
    <text x="824" y="374" fill="#cbd5e1" font-size="17">context + thresholds</text>
    <path d="M600 418V464" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <path d="M582 450L600 470L618 450" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="292" y="488" width="616" height="74" rx="24" fill="#102116" stroke="#34d399"/>
    <text x="336" y="534" fill="#bbf7d0" font-size="24" font-weight="800">Policy decision -> mask, tokenize, block, or allow</text>
  </g>
</svg>
