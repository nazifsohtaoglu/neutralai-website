<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PII masking flow</title>
  <desc id="desc">A privacy stage where raw identifiers are peeled from a customer document and locked away before useful context reaches AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset=".54" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="paper" x1="172" y1="158" x2="498" y2="528" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="stage" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(604 354) scale(430 260)">
      <stop stop-color="#22d3ee" stop-opacity=".22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity=".46"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stage)"/>
  <g font-family="Arial, sans-serif">
    <text x="76" y="86" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">PII MASKING</text>
    <text x="76" y="132" fill="#f8fafc" font-size="38" font-weight="800">The task continues after identity is removed.</text>
  </g>
