    <path d="M424 158V226C424 234 430 240 438 240H504" fill="#94a3b8"/>
    <circle cx="246" cy="246" r="32" fill="#fed7aa"/>
    <path d="M216 326H422" stroke="#0f172a" stroke-width="15" stroke-linecap="round" opacity=".72"/>
    <path d="M216 378H402" stroke="#fb7185" stroke-width="18" stroke-linecap="round"/>
    <path d="M216 430H452" stroke="#0f172a" stroke-width="15" stroke-linecap="round" opacity=".48"/>
  </g>
  <path d="M426 376C500 372 548 344 604 304" stroke="#fb7185" stroke-width="10" stroke-linecap="round"/>
  <path d="M426 428C528 454 606 450 714 406" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" opacity=".72"/>
