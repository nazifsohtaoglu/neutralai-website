<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PII masking flow diagram</title>
  <desc id="desc">A prompt masking flow showing raw identifiers transformed into safe placeholders before the model sees the prompt.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <rect x="40" y="40" width="1120" height="550" rx="36" fill="#0b1526" stroke="#24415f"/>
  <text x="84" y="98" fill="#22d3ee" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">PII MASKING FLOW</text>
  <text x="84" y="144" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="800">Keep the task. Remove the raw identifiers.</text>
  <g font-family="Arial, sans-serif">
    <rect x="92" y="224" width="360" height="196" rx="26" fill="#2a1420" stroke="#fb7185" stroke-opacity=".75"/>
    <text x="124" y="272" fill="#fecdd3" font-size="26" font-weight="800">Raw prompt</text>
    <text x="124" y="322" fill="#f8fafc" font-size="20">Sarah Patel</text>
    <text x="124" y="356" fill="#f8fafc" font-size="20">sarah@acme.example</text>
    <text x="124" y="390" fill="#f8fafc" font-size="20">+44 7123 456 789</text>
    <path d="M484 322H586" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <path d="M572 303L594 322L572 341" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="618" y="224" width="160" height="196" rx="26" fill="#062b3a" stroke="#22d3ee"/>
    <text x="650" y="304" fill="#a7f3d0" font-size="24" font-weight="800">Mask</text>
    <text x="650" y="342" fill="#a7f3d0" font-size="24" font-weight="800">Policy</text>
    <path d="M810 322H912" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <path d="M898 303L920 322L898 341" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="944" y="224" width="188" height="196" rx="26" fill="#102116" stroke="#34d399" stroke-opacity=".75"/>
    <text x="976" y="272" fill="#bbf7d0" font-size="26" font-weight="800">Model sees</text>
    <text x="976" y="322" fill="#f8fafc" font-size="20">&lt;PERSON&gt;</text>
    <text x="976" y="356" fill="#f8fafc" font-size="20">&lt;EMAIL&gt;</text>
    <text x="976" y="390" fill="#f8fafc" font-size="20">&lt;PHONE&gt;</text>
  </g>
</svg>
