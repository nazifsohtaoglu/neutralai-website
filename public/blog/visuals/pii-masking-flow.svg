<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PII masking flow</title>
  <desc id="desc">A privacy illustration showing raw identifiers removed from a document before the useful business task reaches an AI model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset=".52" stop-color="#0a1726"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="doc" x1="186" y1="168" x2="428" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#020617" flood-opacity=".46"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif">
    <text x="76" y="88" fill="#22d3ee" font-size="18" font-weight="700" letter-spacing="3">PII MASKING</text>
    <text x="76" y="134" fill="#f8fafc" font-size="38" font-weight="800">Keep the task. Remove the identifiers.</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M178 184C178 170 190 158 204 158H424L500 234V484C500 498 488 510 474 510H204C190 510 178 498 178 484V184Z" fill="url(#doc)"/>
    <path d="M424 158V226C424 234 430 240 438 240H500" fill="#94a3b8"/>
    <circle cx="246" cy="236" r="34" fill="#fed7aa"/>
    <path d="M220 318H430" stroke="#0f172a" stroke-width="15" stroke-linecap="round" opacity=".75"/>
    <path d="M220 366H410" stroke="#fb7185" stroke-width="18" stroke-linecap="round"/>
    <path d="M220 414H450" stroke="#0f172a" stroke-width="15" stroke-linecap="round" opacity=".55"/>
  </g>
  <g>
    <rect x="562" y="244" width="120" height="120" rx="36" fill="#062b3a" stroke="#22d3ee"/>
    <path d="M604 288V270C604 250 640 250 640 270V288" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round"/>
    <rect x="592" y="286" width="60" height="48" rx="12" fill="#34d399"/>
    <path d="M506 322H562" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
    <path d="M540 300L566 322L540 344" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M682 322H738" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
    <path d="M716 300L742 322L716 344" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="744" y="176" width="302" height="304" rx="34" fill="#0d1a2c" stroke="#334155"/>
    <rect x="800" y="236" width="154" height="28" rx="14" fill="#22d3ee" opacity=".25"/>
    <rect x="800" y="298" width="184" height="28" rx="14" fill="#34d399"/>
    <rect x="800" y="356" width="142" height="28" rx="14" fill="#34d399" opacity=".74"/>
    <rect x="800" y="414" width="196" height="28" rx="14" fill="#f8fafc" opacity=".4"/>
    <path d="M1022 236C1060 252 1082 284 1082 326C1082 378 1046 420 998 432" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" opacity=".7"/>
  </g>
  <text x="770" y="538" fill="#b6c2d4" font-family="Arial, sans-serif" font-size="22" font-weight="700">Useful context goes on.</text>
</svg>
