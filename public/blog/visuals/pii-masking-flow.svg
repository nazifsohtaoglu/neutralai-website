    <path d="M616 286V266C616 244 660 244 660 266V286" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round"/>
    <rect x="604" y="284" width="70" height="54" rx="14" fill="#34d399"/>
    <path d="M624 312L638 326L664 290" stroke="#052e1a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="540" y="388" width="184" height="54" rx="20" fill="#211827" stroke="#fb7185"/>
    <path d="M574 416H690" stroke="#fecdd3" stroke-width="10" stroke-linecap="round"/>
  </g>
